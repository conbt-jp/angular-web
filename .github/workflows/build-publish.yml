name: Use shared Angular workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "CALLER WORKFLOW"
          echo "Repository: ${{ github.repository }}"
          echo "Branch : ${{ github.ref_name }}"

  build:
    uses: conbt-jp/github-actions-templates/.github/workflows/angular-build-publish.yml@main
    with:
      app-directory: angular-web
      package-name: angular-web
      node-version: "24"